  :root{

  #gate{

    transition:opacity .9s ease, visibility .9s ease;
  }
  #gate.hidden{opacity:0;visibility:hidden;pointer-events:none;}

    user-select:none;

  }

    50%{ -webkit-text-stroke-color:var(--gold); }
  }

    color:var(--sage);

    margin-top:-60px;
